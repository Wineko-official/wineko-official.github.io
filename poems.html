        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ========== ФОН: КАРТИНКА bg_poetry.png ========== */
        body {
            background: url('bg_poetry.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', 'Times New Roman', serif;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Світлячки залишаються (поверх фону) */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            filter: blur(0.8px);
            pointer-events: none;
            z-index: 1;
        }

        /* ========== КНИГА ФІКСОВАНОГО РОЗМІРУ ========== */
        .book-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            pointer-events: auto;
        }

        .grimoire {
            display: flex;
            background: #2f1e18;
            border-radius: 24px 12px 12px 24px;
            padding: 18px 18px 18px 28px;
            box-shadow: 0 40px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,245,210,0.1);
            position: relative;
            min-height: 600px;
            height: 80vh;
            max-height: 700px;
        }

        /* Корінець */
        .grimoire::before {
            content: "";
            position: absolute;
            left: -24px;
            top: 24px;
            bottom: 24px;
            width: 34px;
            background: linear-gradient(120deg, #1c120e, #3b2a20 40%, #1c120e);
            border-radius: 20px 0 0 20px;
            box-shadow: inset -2px 0 8px rgba(0,0,0,0.6), 4px 0 12px rgba(0,0,0,0.3);
            z-index: 3;
        }
        .grimoire::after {
            content: "";
            position: absolute;
            left: -24px;
            top: 50%;
            transform: translateY(-50%);
            width: 34px;
            height: 75%;
            background: repeating-linear-gradient(90deg, rgba(90,65,45,0.5) 0px, rgba(90,65,45,0.5) 5px, rgba(30,18,10,0.7) 5px, rgba(30,18,10,0.7) 10px);
            border-radius: 20px 0 0 20px;
            z-index: 4;
            pointer-events: none;
        }

        /* ЛІВА СТОРІНКА (МЕНЮ) */
        .page-left {
            width: 35%;
            background: #f3ecdb;
            background-image: radial-gradient(circle at 20% 30%, rgba(80,55,35,0.08) 1px, transparent 1px);
            background-size: 22px 22px;
            border-radius: 16px 0 0 16px;
            padding: 30px 20px;
            overflow-y: auto;
            box-shadow: inset -2px 0 25px rgba(0,0,0,0.1), inset 0 0 0 1px rgba(255,250,210,0.6);
            position: relative;
        }

        /* ПРАВА СТОРІНКА (ТЕКСТ) – З ПОВНОЦІННОЮ АНІМАЦІЄЮ ПЕРЕГОРТАННЯ */
        .page-right {
            width: 65%;
            background: #faf3e5;
            background-image: radial-gradient(circle at 90% 20%, rgba(90,65,40,0.07) 1px, transparent 1px);
            background-size: 25px 25px;
            border-radius: 0 16px 16px 0;
            padding: 45px 45px;
            overflow-y: auto;
            box-shadow: inset 2px 0 25px rgba(0,0,0,0.08), inset 0 0 0 1px rgba(255,250,210,0.5);
            position: relative;
            transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transform-origin: left center;
            transform-style: preserve-3d;
            backface-visibility: hidden;
            will-change: transform;
        }
        /* Клас для анімації перегортання (повний розворот) */
        .page-right.flip {
            transform: rotateY(-180deg);
        }

        .page-left::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 0% 50%, rgba(100,60,30,0.1), transparent 70%);
            pointer-events: none;
        }
        .page-right::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.12), transparent 40px);

<canvas id="fireflyCanvas"></canvas>

<div class="book-wrapper">

            <ul class="poem-list" id="poemList"></ul>

        <div class="page-right" id="poemPage">

            <div class="poem-content" id="poemContent"></div>
        </div>
    </div>
</div>
<a href="index.html" class="back-btn">← На головну</a>

<script>
    // ========== ВАШІ ВІРШІ ==========
    const poems = [
        {
            title: "Чому у лісі дуже темно",
            content: `Чому у лісі дуже темно, чому немає грибожаб?
Куди поділись тропіколі, куди пропав магічний шлях?
Куди поділися дерева, які росли аж до небес?
Що сталося з тобою, моя земле?
Хто захотів скривдити тебе?

Це культ розкинув свої лапи,
Щоб загарбати всіх нас.
Створіння їхні, мутатонти,
Не мають жалю та поваги до природи.

Настав той час, коли потрібні ми своїй землі,
І наша битва скаже все:
Хто з совістю і з любов'ю до природи,
А хто отримає від нас за все!`
        },
        {
            title: "Пустеля не тільки назовні",
            content: `Чарує красою і спритністю тіла,
З дитинства поживши у тяжкій журбі,
Знедолена дівчина з лезом в долонях...
Закортіло їй дуже пізнати цей світ.

Знайшовши собі спільноту по духу —
Для бідних спасіння, для знаті повчання, —
Не може так бути, поки ми тут є,
Що бідні без хліба, а в магнатів є все!

Минали роки та йшли місяці,
Ми, як зазвичай, крали в бридоти,
Але не було вже такого запалу —
Все більше багатство лишали собі.
«Нечесно, неправда, не може так бути!» —
Кричала собі у своїй голові.

Та сама дівчина, що так закортіла
Пізнати цей захопливий світ,
Зібравшись з думками, сказавши їм все:
Що більше не робимо ми, як бажали,
Що більше немає честі в очах,
Є тільки лиш бруд і тягар на душі!

Отримавши у відповідь лиш тільки сміх
Від друзів, з якими була всі роки,
Сказавши від себе і знявши клеймо:
Що побачимось ми, і настане той час,
Коли мій кинджал зустрінеться з вашим!

Покинувши все і залишивши клан,
Почала поринати в нове життя.
Там світ Етернхольт, там замок Тенсей,
Там нові можливості наших ідей,
Там є тропіколі, там є грибожаб,
Там місце є для гідних людей.`
        }
    ];

    const poemListEl = document.getElementById('poemList');
    const poemPage = document.getElementById('poemPage');
    const poemTitleEl = document.getElementById('poemTitle');
    const poemContentEl = document.getElementById('poemContent');
    let isAnimating = false;
    let currentIndex = 0;

    function changePoem(index) {
        if (isAnimating || index === currentIndex) return;
        const poem = poems[index];
        // Анімація перегортання сторінки (повний розворот)
        poemPage.classList.add('flip');
        isAnimating = true;
        setTimeout(() => {
            // Змінюємо текст під час "напівперевороту"
            poemTitleEl.innerText = poem.title;
            poemContentEl.innerText = poem.content;
            poemPage.classList.remove('flip');
            setTimeout(() => { isAnimating = false; }, 100);
        }, 250); // Час має відповідати transition (0.5s), але змінюємо трохи раніше
        // Оновити активний пункт у списку
        document.querySelectorAll('.poem-list li').forEach((li, i) => {
            if (i === index) li.classList.add('active');
            else li.classList.remove('active');
        });
        currentIndex = index;
    }

    function buildList() {
        poemListEl.innerHTML = '';
        poems.forEach((poem, idx) => {
            const li = document.createElement('li');
            li.textContent = poem.title;
            li.addEventListener('click', () => changePoem(idx));
            poemListEl.appendChild(li);
        });
        if (poems.length) {
            document.querySelector('.poem-list li').classList.add('active');
            poemTitleEl.innerText = poems[0].title;
            poemContentEl.innerText = poems[0].content;
        }
    }
    buildList();

    // ========== СВІТЛЯЧКИ ==========
    const canvas = document.getElementById('fireflyCanvas');
    const ctx = canvas.getContext('2d');
    let w = window.innerWidth;
    let h = window.innerHeight;

    function resizeCanvas() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Firefly {
        constructor() {
            this.x = Math.random() * w;
            this.y = Math.random() * h;
            this.s = Math.random() * 2 + 1;
            this.ang = Math.random() * 2 * Math.PI;
            this.v = 0.15 + Math.random() * 0.3;
            this.angleChange = (Math.random() - 0.5) * 0.04;
        }
        move() {
            this.x += this.v * Math.cos(this.ang);
            this.y += this.v * Math.sin(this.ang);
            this.ang += this.angleChange;
            if (this.x < -50) this.x = w + 50;
            if (this.x > w + 50) this.x = -50;
            if (this.y < -50) this.y = h + 50;
            if (this.y > h + 50) this.y = -50;
        }
        show() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.s, 0, 2 * Math.PI);
            ctx.fillStyle = "#ffdfa5";
            ctx.shadowBlur = 12;
            ctx.shadowColor = "#ffcc66";
            ctx.fill();
        }
    }

    let fireflies = [];
    const MAX_FIREFLIES = 100;

    function draw() {
        while (fireflies.length < MAX_FIREFLIES) {
            fireflies.push(new Firefly());
        }
        for (let i = 0; i < fireflies.length; i++) {
            fireflies[i].move();
            fireflies[i].show();
        }
    }

    function animate() {
        if (!ctx) return;
        ctx.clearRect(0, 0, w, h);
        draw();
        requestAnimationFrame(animate);
    }
    animate();
</script>
