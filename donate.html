    <script>
        function copyCryptoAddress(btn) {
            const addr = "TAG7c6UXuqzw5NnqQ39mcSoTYMjEe6os8J";
            navigator.clipboard.writeText(addr).then(() => { 
                const t = btn.innerText; 
                btn.innerText = "📋 Скопійовано!"; 
                btn.style.borderColor = "#00d2ff"; 
                btn.style.textShadow = "0 0 8px #00d2ff"; 
                btn.style.color = "#00d2ff"; 
                setTimeout(() => { 
                    btn.innerText = t; 
                    btn.style.borderColor = ""; 
                    btn.style.textShadow = ""; 
                    btn.style.color = ""; 
                }, 2500); 
            }).catch(() => alert("Адреса гаманця: " + addr));
        }
    </script>

    <div class="audio-player">
        <button id="musicBtn" onclick="toggleMusic()">🎵 Увімкнути радіо</button>
        <span id="trackName">📻 Радіо Етернхольт</span>
        <div class="volume-container">
            <span>🔈</span>
            <input type="range" id="volumeSlider" min="0" max="100" value="30" oninput="changeVolume(this.value)">
            <span>🔊</span>
        </div>
    </div>
    <div id="youtubePlayer" style="display: none;"></div>

    <script>
        const videoIDs = ["3y_6zqa5jn8","moKNkLdjKws","T5GdIQHGhv0","K_pY6pdh_2M","fL1327aZdfc","vrZLMxPcHYM","d2FW1DcMdiw","liIizxQ6z4A","Ml9rMQdqDQU","FZCCWVIcFYo","_9vRwdG7IvU","ezYuc1jnP9I"];
        const trackNames = ["Wi-Range - Lyric Story","Wi-Range - Intro","Wi-Range - Skeleton Knight","Wi-Range - Future","Wi-Range - Miami beach","Wi-Range - Night Ranger","Wi-Range & DENIS-G - Night City of Miami","Wi-Range & DENIS-G - NIGHT ROAD (ORIGINAL MIX)","Wi_Range feat Denis-g - back to 80's","Wi_Range - Revenge","Wi_range - Iron age","Wi-Range - Lost In Time"];

        let player = null, isPlaying = false, currentTrack = -1, currentTime = 0, isPlayerReady = false;

        function saveState() { if (currentTrack !== -1 && isPlayerReady) { localStorage.setItem('radio_track', currentTrack); localStorage.setItem('radio_time', currentTime); } }
        function loadSavedState() {
            const savedTrack = localStorage.getItem('radio_track');
            const savedTime = parseFloat(localStorage.getItem('radio_time'));
            if (savedTrack !== null && savedTrack >= 0 && isPlayerReady) {
                currentTrack = parseInt(savedTrack);
                currentTime = isNaN(savedTime) ? 0 : savedTime;
                isPlaying = false;
                document.getElementById("trackName").innerText = "📻 " + trackNames[currentTrack];
                player.loadVideoById({ videoId: videoIDs[currentTrack], startSeconds: 0 });
                let interval = setInterval(() => {
                    const dur = player.getDuration();
                    if (dur && dur > 0 && currentTime < dur) {
                        clearInterval(interval);
                        player.seekTo(currentTime, true);
                        player.pauseVideo();
                    }
                }, 100);
            } else { currentTrack = -1; }
        }
        function onPlayerReady() {
            isPlayerReady = true;
            loadSavedState();
            setInterval(() => {
                if (player && player.getCurrentTime && isPlayerReady && currentTrack !== -1) {
                    const t = player.getCurrentTime();
                    if (t && !isNaN(t)) { currentTime = t; saveState(); }
                }
            }, 2000);
        }
        function onPlayerStateChange(event) {
            const btn = document.getElementById("musicBtn");
            if (event.data === YT.PlayerState.PLAYING) {
                isPlaying = true;
                if (btn) { btn.innerText = "⏸ Пауза"; btn.style.borderColor = "#ff6400"; }
                saveState();
            } else if (event.data === YT.PlayerState.PAUSED) {
                isPlaying = false;
                if (btn) { btn.innerText = "🎵 Увімкнути радіо"; btn.style.borderColor = "#444"; }
                saveState();
            } else if (event.data === YT.PlayerState.ENDED && currentTrack !== -1) {
                let newTrack = currentTrack;
                while (newTrack === currentTrack && videoIDs.length > 1) newTrack = Math.floor(Math.random() * videoIDs.length);
                currentTrack = newTrack;
                currentTime = 0;
                document.getElementById("trackName").innerText = "📻 " + trackNames[currentTrack];
                player.loadVideoById({ videoId: videoIDs[currentTrack], startSeconds: 0 });
                if (isPlaying) player.playVideo();
                saveState();
            }
        }
        function toggleMusic() {
            if (!player || !isPlayerReady) return;
            if (!isPlaying) {
                if (currentTrack === -1) {
                    currentTrack = Math.floor(Math.random() * videoIDs.length);
                    currentTime = 0;
                    document.getElementById("trackName").innerText = "📻 " + trackNames[currentTrack];
                    player.loadVideoById({ videoId: videoIDs[currentTrack], startSeconds: 0 });
                    let interval = setInterval(() => {
                        const dur = player.getDuration();
                        if (dur && dur > 0) {
                            clearInterval(interval);
                            player.seekTo(Math.random() * (dur * 0.7), true);
                            player.playVideo();
                        }
                    }, 100);
                    isPlaying = true;
                } else { player.playVideo(); }
            } else { player.pauseVideo(); }
        }
        function changeVolume(val) { if (player && player.setVolume) player.setVolume(val); }
        // Ініціалізація Iframe API
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtubePlayer', {
                height: '0', width: '0',
                videoId: videoIDs[0],
                playerVars: { autoplay: 0, controls: 0, disablekb: 1, modestbranding: 1 },
                events: { onReady: onPlayerReady, onStateChange: onPlayerStateChange }
            });
        }
        const tag = document.createElement('script');
        tag.src = 'https://www.youtube.com/iframe_api';
        document.head.appendChild(tag);
    </script>
